<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معايدة مجتمع التصنيع</title>
  <link rel="icon" type="image/png" href="Logo/MCLogo.png">
  <link rel="apple-touch-icon" href="Logo/MCLogo.png">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

<body>

  <div class="bg"></div>

  <div id="state-input">

    <h1 class="title">معايدة مجتمع التصنيع</h1>

    <div class="pill-wrapper">
      <input class="pill-input" type="text" id="nameInput" placeholder="أكتب اسمك" maxlength="25" autofocus>
      <button class="pill-btn" onclick="generateCard()" title="أنشئ">→</button>
    </div>
  </div>

  <div id="state-result">
    <canvas id="card-canvas"></canvas>
    <div class="btn-row">

      <button class="action-btn icon-only-btn" onclick="shareCard()" title="نشر" aria-label="نشر">
        <img src="Icons/Share_iOS_Export.svg" alt="" class="btn-icon-img">
      </button>

      <button class="action-btn icon-only-btn" onclick="saveCard()" title="حفظ الصورة" aria-label="حفظ الصورة">
        <img src="Icons/Download.svg" alt="" class="btn-icon-img">
      </button>

      <button class="action-btn text-icon-btn" onclick="goBack()" title="تغيير الاسم" aria-label="تغيير الاسم">
        <img src="Icons/Note_Edit.svg" alt="" class="btn-icon-img">
        <span>تغيير الاسم</span>
      </button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
  <script src="script.js?v=99"></script>
  
  <div class="social-bar">

    <a href="https://x.com/manfactringsa?s=21&t=eufMTvBoXEY9lyePV_D7FA" target="_blank">
      <img src="Icons/Twitter.svg" alt="Twitter">
    </a>

    <a href="https://www.linkedin.com/company/manfactring-community/" target="_blank">
      <svg viewBox="0 0 24 24" fill="white">
        <path
          d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM0 8h5v16H0V8zm7.5 0h4.8v2.2h.1c.7-1.2 2.4-2.5 4.9-2.5 5.2 0 6.2 3.4 6.2 7.8V24h-5v-7.3c0-1.7 0-3.8-2.3-3.8s-2.7 1.8-2.7 3.7V24h-5V8z" />
      </svg> </a>

    <a href="https://www.tiktok.com/@manfactringsa?_r=1&_t=ZS-94j6NgAH21t" target="_blank">
      <img src="Icons/TikTok.svg" alt="TikTok">
    </a>

  </div>

  <footer class="footer">
    <a class="footer-link"
      href="https://www.linkedin.com/in/rana-alsaggaf-47a407291?utm_source=share_via&utm_content=profile&utm_medium=member_ios"
      target="_blank" rel="noopener noreferrer">
      <div class="footer-content">
        <span>صُنع بحب</span>
        <img src="Logo/RanaLogo.png" alt="logo" class="footer-logo">
        <span>السقاف</span>
      </div>
    </a>
  </footer>
</body>

</html>
